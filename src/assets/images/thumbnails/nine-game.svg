<svg width="380" height="214" viewBox="0 0 380 214" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="380" height="214" fill="url(#bg)"/>

  <!-- CPU label -->
  <text x="190" y="22" font-family="Arial, sans-serif" font-size="13" fill="#aaaaaa" text-anchor="middle" letter-spacing="3">CPU</text>

  <!-- CPU Cards (face down, dark) -->
  <g transform="translate(32, 28)">
    <rect width="44" height="60" rx="6" fill="#2c3e50" stroke="#4a6741" stroke-width="2"/>
    <text x="22" y="39" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#7f8c8d" text-anchor="middle">?</text>
  </g>
  <g transform="translate(84, 28)">
    <rect width="44" height="60" rx="6" fill="#2c3e50" stroke="#4a6741" stroke-width="2"/>
    <text x="22" y="39" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#7f8c8d" text-anchor="middle">?</text>
  </g>
  <g transform="translate(136, 28)">
    <rect width="44" height="60" rx="6" fill="#2c3e50" stroke="#4a6741" stroke-width="2"/>
    <text x="22" y="39" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#7f8c8d" text-anchor="middle">?</text>
  </g>
  <g transform="translate(188, 28)">
    <rect width="44" height="60" rx="6" fill="#2c3e50" stroke="#4a6741" stroke-width="2"/>
    <text x="22" y="39" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#7f8c8d" text-anchor="middle">?</text>
  </g>
  <g transform="translate(240, 28)">
    <rect width="44" height="60" rx="6" fill="#2c3e50" stroke="#4a6741" stroke-width="2"/>
    <text x="22" y="39" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#7f8c8d" text-anchor="middle">?</text>
  </g>
  <g transform="translate(292, 28)">
    <rect width="44" height="60" rx="6" fill="#2c3e50" stroke="#4a6741" stroke-width="2"/>
    <text x="22" y="39" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#7f8c8d" text-anchor="middle">?</text>
  </g>

  <!-- VS Badge center -->
  <circle cx="190" cy="107" r="18" fill="#e74c3c"/>
  <text x="190" y="114" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">VS</text>

  <!-- Player Cards (face up, colorful) -->
  <!-- Card 3 - red -->
  <g transform="translate(32, 126)">
    <rect width="44" height="60" rx="6" fill="#ffffff" stroke="#e74c3c" stroke-width="2"/>
    <text x="22" y="48" font-family="Arial, sans-serif" font-size="30" font-weight="bold" fill="#e74c3c" text-anchor="middle">3</text>
  </g>
  <!-- Card 5 - black -->
  <g transform="translate(84, 126)">
    <rect width="44" height="60" rx="6" fill="#ffffff" stroke="#2c3e50" stroke-width="2"/>
    <text x="22" y="48" font-family="Arial, sans-serif" font-size="30" font-weight="bold" fill="#2c3e50" text-anchor="middle">5</text>
  </g>
  <!-- Card 7 - red, highlighted/selected -->
  <g transform="translate(136, 120)">
    <rect width="44" height="60" rx="6" fill="#fff3e0" stroke="#e74c3c" stroke-width="3"/>
    <text x="22" y="48" font-family="Arial, sans-serif" font-size="30" font-weight="bold" fill="#e74c3c" text-anchor="middle">7</text>
    <!-- glow effect -->
    <rect x="-3" y="-3" width="50" height="66" rx="8" fill="none" stroke="#f39c12" stroke-width="2" opacity="0.7"/>
  </g>
  <!-- Card 8 - black -->
  <g transform="translate(188, 126)">
    <rect width="44" height="60" rx="6" fill="#ffffff" stroke="#2c3e50" stroke-width="2"/>
    <text x="22" y="48" font-family="Arial, sans-serif" font-size="30" font-weight="bold" fill="#2c3e50" text-anchor="middle">8</text>
  </g>
  <!-- Card 9 - red -->
  <g transform="translate(240, 126)">
    <rect width="44" height="60" rx="6" fill="#ffffff" stroke="#e74c3c" stroke-width="2"/>
    <text x="22" y="48" font-family="Arial, sans-serif" font-size="30" font-weight="bold" fill="#e74c3c" text-anchor="middle">9</text>
  </g>
  <!-- Card used (faded) -->
  <g transform="translate(292, 126)">
    <rect width="44" height="60" rx="6" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="2"/>
    <text x="22" y="48" font-family="Arial, sans-serif" font-size="30" font-weight="bold" fill="#bdc3c7" text-anchor="middle">1</text>
  </g>

  <!-- YOU label -->
  <text x="190" y="203" font-family="Arial, sans-serif" font-size="13" fill="#aaaaaa" text-anchor="middle" letter-spacing="3">YOU</text>
</svg>
