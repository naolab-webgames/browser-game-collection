<svg width="380" height="214" viewBox="0 0 380 214" xmlns="http://www.w3.org/2000/svg">
  <!-- Background (Gradient) -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="380" height="214" fill="url(#bgGradient)"/>

  <!-- 3x3 Grid -->
  <g transform="translate(100, 30)">
    <!-- Grid cells (3x3) -->
    <rect x="0" y="0" width="50" height="50" fill="#FFFFFF" opacity="0.3" rx="4"/>
    <rect x="60" y="0" width="50" height="50" fill="#FFFFFF" opacity="0.3" rx="4"/>
    <rect x="120" y="0" width="50" height="50" fill="#FFFFFF" opacity="0.3" rx="4"/>

    <rect x="0" y="60" width="50" height="50" fill="#FFFFFF" opacity="0.3" rx="4"/>
    <rect x="60" y="60" width="50" height="50" fill="#3498db" rx="4"/>
    <rect x="120" y="60" width="50" height="50" fill="#FFFFFF" opacity="0.3" rx="4"/>

    <rect x="0" y="120" width="50" height="50" fill="#FFFFFF" opacity="0.3" rx="4"/>
    <rect x="60" y="120" width="50" height="50" fill="#FFFFFF" opacity="0.3" rx="4"/>
    <rect x="120" y="120" width="50" height="50" fill="#FFFFFF" opacity="0.3" rx="4"/>

    <!-- Number in active cell -->
    <text x="85" y="100" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#FFFFFF" text-anchor="middle">7</text>
  </g>

  <!-- Brain icon (simplified) -->
  <g transform="translate(280, 40)">
    <ellipse cx="25" cy="30" rx="22" ry="28" fill="none" stroke="#FFFFFF" stroke-width="3"/>
    <path d="M 10 20 Q 15 15 20 20" fill="none" stroke="#FFFFFF" stroke-width="2"/>
    <path d="M 15 30 Q 20 25 25 30" fill="none" stroke="#FFFFFF" stroke-width="2"/>
    <path d="M 25 35 Q 30 30 35 35" fill="none" stroke="#FFFFFF" stroke-width="2"/>
    <path d="M 30 20 Q 35 15 40 20" fill="none" stroke="#FFFFFF" stroke-width="2"/>
    <circle cx="18" cy="25" r="2" fill="#FFFFFF"/>
    <circle cx="32" cy="25" r="2" fill="#FFFFFF"/>
  </g>

  <!-- Match buttons illustration -->
  <g transform="translate(30, 160)">
    <!-- Position button -->
    <rect x="0" y="0" width="150" height="35" fill="#3498db" rx="6"/>
    <text x="75" y="23" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Position Match</text>
  </g>

  <g transform="translate(200, 160)">
    <!-- Number button -->
    <rect x="0" y="0" width="150" height="35" fill="#e74c3c" rx="6"/>
    <text x="75" y="23" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Number Match</text>
  </g>

  <!-- Title banner -->
  <rect x="0" y="0" width="380" height="50" fill="#000000" opacity="0.6"/>
  <text x="190" y="25" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#FFFFFF" text-anchor="middle">DUAL N-BACK</text>
  <text x="190" y="42" font-family="Arial, sans-serif" font-size="12" font-weight="normal" fill="#FFFFFF" text-anchor="middle">Train Your Memory</text>
</svg>
